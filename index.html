<style>
  :root{
    --blue:#5C6B85;
    --blue-deep:#3B4759;
    --gold:#B8874A;
    --gold-deep:#8C6530;
    --board:#20242B;
    --board-2:#2E3440;
    --paper:#F7F5F0;
    --paper-dim:#EBE7DD;
    --ink:#262A31;
    --ink-soft:#6E7480;
    --line:#D9D4C6;
    --c-aardappel:#A8763E;
    --c-rijst:#4F7D77;
    --c-pasta:#C98A2C;
    --c-solo:#6E7A4C;
    --c-wrap:#C1592F;
    --c-boodschappen:#7D6B8C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--board); color:var(--ink); font-family:'Work Sans',sans-serif;}
  body{
    min-height:100vh;
    display:flex; justify-content:center;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,255,255,0.04), transparent 40%),
      var(--board);
  }
  #app{
    width:100%; max-width:480px; min-height:100vh;
    background:var(--paper);
    display:flex; flex-direction:column;
    position:relative;
    box-shadow:0 0 60px rgba(0,0,0,0.5);
  }

  /* Header */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg, var(--blue) 0%, var(--blue-deep) 100%);
    color:var(--paper);
    padding:calc(16px + env(safe-area-inset-top)) 16px 15px 16px;
    display:flex; align-items:center; gap:11px;
    min-height:34px;
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 3px 14px rgba(0,0,0,0.25);
    border-bottom:1px solid rgba(184,135,74,0.55);
  }
  header .back{
    background:none; border:none; color:var(--paper);
    font-family:'Work Sans',sans-serif; font-weight:500; font-size:13.5px;
    padding:6px 10px 6px 4px; cursor:pointer; opacity:0.9;
    display:flex; align-items:center; gap:6px; border-radius:8px;
  }
  header .back:active{opacity:0.5;}
  header .back svg{width:14px; height:14px;}
  header .title{
    font-family:'Fraunces',serif; font-weight:600; font-size:19px; letter-spacing:0.2px;
    flex:1; line-height:1.3;
  }
  header .eyebrow{
    font-family:'Work Sans',sans-serif; font-size:10.5px; letter-spacing:0.1em; font-weight:600;
    text-transform:uppercase; color:#ffffff; opacity:0.85; display:block; margin-bottom:2px;
  }
  header .logo-mark{display:block; flex-shrink:0; width:26px; height:26px; color:var(--paper);}

  main{flex:1; padding:18px 16px calc(40px + env(safe-area-inset-bottom));}

  /* HOME */
  .home-intro{padding:4px 2px 22px;}
  .home-hero{display:flex; align-items:center; gap:14px;}
  .home-logo{width:56px; height:56px; flex-shrink:0; filter:drop-shadow(0 6px 14px rgba(38,42,49,0.28));}
  .home-hero h1{
    font-family:'Fraunces',serif; font-style:normal; font-weight:600;
    font-size:34px; margin:0; color:var(--ink); line-height:1.1; letter-spacing:0.01em;
  }
  .rule{
    width:38px; height:2px; background:var(--gold); margin-top:18px; border-radius:2px;
  }
  .section-label{
    font-family:'Work Sans',sans-serif; font-size:11.5px; letter-spacing:0.14em; font-weight:600;
    text-transform:uppercase; color:var(--gold-deep); margin:18px 2px 10px;
  }
  .rule-2{ margin:22px 2px 4px; }

  .tabs{display:flex; flex-direction:column; gap:11px;}
  .tab{
    position:relative;
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(180deg, #ffffff, var(--paper-dim));
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    cursor:pointer; text-align:left;
    box-shadow:0 1px 2px rgba(38,42,49,0.04), 0 8px 20px -8px rgba(38,42,49,0.18);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .tab .medallion{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:color-mix(in srgb, var(--tab-color) 16%, white);
    color:var(--tab-color);
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--tab-color) 30%, white);
  }
  .tab .medallion svg{width:22px; height:22px;}
  .tab .txt{flex:1; min-width:0;}
  .tab .txt .name{
    font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--ink);
    display:block;
  }
  .tab .txt .count{
    font-family:'Work Sans',sans-serif; font-size:11.5px; letter-spacing:0.05em; font-weight:500;
    color:var(--ink-soft); display:block; margin-top:3px;
  }
  .tab .arrow{color:var(--gold-deep); font-size:19px; flex-shrink:0;}
  .tab:active{transform:scale(0.985); box-shadow:0 1px 2px rgba(38,42,49,0.05);}

  /* LIST */
  .card{
    background:linear-gradient(180deg, #ffffff, var(--paper-dim));
    border:1px solid var(--line);
    border-radius:14px;
    padding:13px 15px;
    margin-bottom:9px;
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
    box-shadow:0 1px 2px rgba(38,42,49,0.04), 0 6px 16px -8px rgba(38,42,49,0.16);
    transition:transform 0.15s ease;
  }
  .card:active{transform:scale(0.985);}
  .card .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--tab-color); flex-shrink:0;
    box-shadow:0 0 0 3px color-mix(in srgb, var(--tab-color) 18%, white);
  }
  .card .body{flex:1; min-width:0;}
  .card .rname{
    font-family:'Fraunces',serif; font-weight:600; font-size:16.5px; line-height:1.3;
    display:block;
  }
  .card .meta{
    display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;
  }
  .tag{
    font-family:'Work Sans',sans-serif; font-size:10px; letter-spacing:0.05em; font-weight:600;
    text-transform:uppercase; padding:3px 9px; border-radius:20px;
    background:transparent; color:var(--ink-soft); border:1px solid var(--line);
  }
  .tag.src{background:transparent; color:var(--tab-color); border:1px solid var(--tab-color);}
  .card .arrow{color:var(--gold-deep);}

  /* DETAIL */
  .detail-head{margin-bottom:8px;}
  .detail-head .cat-eyebrow{
    font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; font-weight:600;
    text-transform:uppercase; color:var(--tab-color);
  }
  .detail-head h2{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:27px; margin:5px 0 12px; line-height:1.15;
  }
  .badges{display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;}

  .ingr-box{
    background:linear-gradient(180deg, #ffffff, var(--paper-dim));
    border:1px solid var(--line); border-radius:16px;
    padding:4px 4px 8px;
    box-shadow:0 1px 2px rgba(38,42,49,0.04), 0 10px 24px -12px rgba(38,42,49,0.2);
  }
  .ingr-title{
    font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; font-weight:600;
    text-transform:uppercase; color:var(--gold-deep); padding:14px 16px 10px;
    border-bottom:1px solid var(--line); margin-bottom:2px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .reset-link{
    letter-spacing:0.02em; text-transform:none; color:var(--ink-soft);
    font-weight:500; cursor:pointer; opacity:0.75;
  }
  .reset-link:active{opacity:0.4;}
  ul.ingr{list-style:none; margin:0; padding:2px 8px 6px;}
  ul.ingr li{
    display:flex; align-items:center; gap:12px;
    padding:9px 8px; font-size:15px; line-height:1.3;
    border-bottom:1px solid rgba(217,212,198,0.6);
    cursor:pointer; user-select:none;
  }
  ul.ingr li:last-child{border-bottom:none;}
  ul.ingr li .box{
    width:20px; height:20px; border-radius:50%;
    border:1.6px solid var(--gold); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  ul.ingr li .box::after{

            <circle cx="27" cy="30" r="8" fill="#8B93A6"/>
            <circle cx="57" cy="30" r="8" fill="#8B93A6"/>
            <circle cx="27" cy="30" r="4.2" fill="#E8B9B0"/>
            <circle cx="57" cy="30" r="4.2" fill="#E8B9B0"/>
            <circle cx="42" cy="42" r="15" fill="#8B93A6"/>
            <ellipse cx="42" cy="49" rx="7" ry="5.5" fill="#F3E7D8"/>
            <ellipse cx="42" cy="46" rx="2.3" ry="1.7" fill="#7A4B42"/>
            <line x1="35" y1="47" x2="23" y2="44" stroke="#8A6F58" stroke-width="1"/>
            <line x1="35" y1="50" x2="23" y2="52" stroke="#8A6F58" stroke-width="1"/>
            <line x1="49" y1="47" x2="61" y2="44" stroke="#8A6F58" stroke-width="1"/>
            <line x1="49" y1="50" x2="61" y2="52" stroke="#8A6F58" stroke-width="1"/>
            <circle cx="36" cy="38" r="2.4" fill="#2E2016"/>
            <circle cx="48" cy="38" r="2.4" fill="#2E2016"/>
            <circle cx="36.9" cy="37" r="0.7" fill="#ffffff"/>
            <circle cx="48.9" cy="37" r="0.7" fill="#ffffff"/>
            <ellipse cx="42" cy="29" rx="11" ry="4.5" fill="#FBF3E8"/>
            <circle cx="35" cy="19" r="6.5" fill="#FBF3E8"/>
            <circle cx="43" cy="14" r="8" fill="#FBF3E8"/>
            <circle cx="51" cy="20" r="6" fill="#FBF3E8"/>
            <path d="M55 66 Q66 80 78 64" stroke="#8B93A6" stroke-width="5" stroke-linecap="round" fill="none"/>
            <line x1="78" y1="60" x2="78" y2="28" stroke="#A9784E" stroke-width="4.5" stroke-linecap="round"/>
            <ellipse cx="78" cy="18" rx="9" ry="10" fill="#C79768" stroke="#8C6635" stroke-width="1"/>
            <ellipse cx="75.5" cy="15" rx="4" ry="4.5" fill="#E0B98A" opacity="0.6"/>

          </svg>
          <h1>COOKED</h1>
        </div>
        <div class="rule"></div>
      </div>
      <div class="section-label">Recepten</div>
      <div class="tabs">
        ${MEAL_CATS.map((key)=>{
          const c = DATA[key];
          return `<button class="tab" style="--tab-color:${c.color}" onclick="openCat('${key}')">
            <span class="medallion">${CAT_ICON[key]}</span>
            <span class="txt">
              <span class="name">${c.label}</span>
              <span class="count">${totalRecipes(key)} recepten</span>
            </span>
            <span class="arrow">›</span>
          </button>`;
        }).join('')}
      </div>
      <div class="rule rule-2"></div>
      <div class="section-label">Boodschappen</div>
      <div class="tabs">
        ${(() => {
          const b = DATA.boodschappen;
          const s = b.subcats[0];
          return `<button class="tab" style="--tab-color:${b.color}" onclick="openSubDirect('boodschappen','${s.key}')">
            <span class="medallion">${CAT_ICON.boodschappen}</span>
            <span class="txt">
              <span class="name">${s.label}</span>
              <span class="count">${s.recipes.length} lijst${s.recipes.length===1?'':'en'}</span>
            </span>
            <span class="arrow">›</span>
          </button>`;
        })()}
      </div>
    `;
  }

  if(state.view === "subcats"){
    const c = DATA[state.cat];
    titleEl.innerHTML = `<span class="eyebrow" style="display:block;">Categorie</span>${c.label}`;
    main.innerHTML = `<div class="tabs">
      ${c.subcats.map(s=>`
        <button class="tab" style="--tab-color:${c.color}" onclick="openSub('${s.key}')">
          <span class="medallion">${CAT_ICON[state.cat]}</span>
          <span class="txt">
            <span class="name">${s.label}</span>
            <span class="count">${s.recipes.length} recepten</span>
          </span>
          <span class="arrow">›</span>
        </button>
      `).join('')}
    </div>`;
  }

  if(state.view === "list"){
    const c = DATA[state.cat];
    const recipes = currentRecipes();
    if(c.subcats){
      const s = c.subcats.find(x=>x.key===state.sub);
      titleEl.innerHTML = `<span class="eyebrow" style="display:block;">${c.label}</span>${s.label}`;
    } else {
      titleEl.innerHTML = `<span class="eyebrow" style="display:block;">Categorie</span>${c.label}`;
    }
    main.innerHTML = recipes.map((r,i)=>`
      <div class="card" style="--tab-color:${c.color}" onclick="openRecipe(${i})">
        <span class="dot"></span>
        <span class="body">
          <span class="rname">${r.name}</span>
          <span class="meta">
            ${r.tags.map(t=>`<span class="tag src" style="--tab-color:${c.color}">${t}</span>`).join('')}
            ${r.todo ? `<span class="tag">nog aanvullen</span>` : ``}
          </span>
        </span>
        <span class="arrow">›</span>
      </div>
    `).join('');
  }

  if(state.view === "detail"){
    const c = DATA[state.cat];
    const recipes = currentRecipes();
    const r = recipes[state.idx];
    const recipeKey = slug(state.cat + '-' + (state.sub||'none') + '-' + r.name);
    titleEl.textContent = c.subcats ? c.subcats.find(x=>x.key===state.sub).label : c.label;
    main.innerHTML = `
      <div class="detail-head">
        <span class="cat-eyebrow" style="color:${c.color}">${c.label}${c.subcats ? ' · ' + c.subcats.find(x=>x.key===state.sub).label : ''}</span>
        <h2>${r.name}</h2>
        <div class="badges">
          ${r.tags.map(t=>`<span class="tag src" style="--tab-color:${c.color}">${t}</span>`).join('')}
        </div>
      </div>
      <div class="ingr-box">
        <div class="ingr-title">${r.listLabel || 'Ingrediënten'} <span class="reset-link" onclick="resetChecks('${recipeKey}', event)">alles uit</span></div>
        <ul class="ingr">
          ${r.ingredients.map((ing,idx)=> ing.startsWith('§')
            ? `<li class="section-header">${ing.slice(1)}</li>`
            : `<li data-idx="${idx}" onclick="toggleIngr('${recipeKey}', this)"><span class="box"></span><span class="ing-text">${ing}</span></li>`
          ).join('')}
        </ul>
      </div>
      ${r.note ? `<div class="note ${r.todo?'todo':''}">${r.note}</div>` : ``}
      ${r.link ? `<a class="link" href="${r.link}" target="_blank" rel="noopener">bekijk origineel recept ↗</a>` : ``}
    `;
    loadChecks(recipeKey);
  }
}

function slug(s){
  return s.toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-+|-+$)/g,'');
}

const hasClaudeStorage = (typeof window !== 'undefined') && !!window.storage;

async function storageGet(key){
  if(hasClaudeStorage){
    try{ return await window.storage.get(key, false); }catch(e){ return null; }
  }
  try{
    const v = localStorage.getItem(key);
    return v !== null ? { value: v } : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value, false); }catch(e){ /* negeren */ }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ /* negeren */ }
}

async function loadChecks(recipeKey){
  try{
    const res = await storageGet('check:'+recipeKey);
    if(res && res.value){
      const checkedSet = new Set(JSON.parse(res.value));
      document.querySelectorAll('#main ul.ingr li').forEach(li=>{
        if(li.dataset.idx !== undefined && checkedSet.has(Number(li.dataset.idx))) li.classList.add('checked');
      });
    }
  }catch(e){ /* nog geen opgeslagen vinkjes voor dit recept */ }
}

async function toggleIngr(recipeKey, el){
  el.classList.toggle('checked');
  const ul = el.closest('ul.ingr');
  const checkedIdxs = [...ul.querySelectorAll('li.checked')].map(li=>Number(li.dataset.idx));
  await storageSet('check:'+recipeKey, JSON.stringify(checkedIdxs));
}

async function resetChecks(recipeKey, evt){
  evt.stopPropagation();
  document.querySelectorAll('#main ul.ingr li.checked').forEach(li=>li.classList.remove('checked'));
  await storageSet('check:'+recipeKey, JSON.stringify([]));
}

function openCat(key){
  historyStack.push({...state});
  const c = DATA[key];
  if(c.subcats){
    state = { view:"subcats", cat:key, sub:null, idx:null };
  } else {
    state = { view:"list", cat:key, sub:null, idx:null };
  }
  render();
  window.scrollTo(0,0);
}
function openSubDirect(catKey, subKey){
  historyStack.push({...state});
  state = { view:"list", cat:catKey, sub:subKey, idx:null };
  render();
  window.scrollTo(0,0);
}
function openSub(subKey){
  historyStack.push({...state});
  state = { view:"list", cat:state.cat, sub:subKey, idx:null };
  render();
  window.scrollTo(0,0);
}
function openRecipe(i){
  historyStack.push({...state});
  state = { view:"detail", cat:state.cat, sub:state.sub, idx:i };
  render();
  window.scrollTo(0,0);
}
function goBack(){
  const prev = historyStack.pop();
  if(prev){ state = prev; render(); window.scrollTo(0,0); }
  else { state = {view:"home", cat:null, sub:null, idx:null}; render(); }
}

render();
</script>
